apiVersion: v1
kind: ServiceAccount
metadata:
  name: diabetes-service
  namespace: ml-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: diabetes-service
  namespace: ml-platform
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: diabetes-service
  namespace: ml-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: diabetes-service
subjects:
- kind: ServiceAccount
  name: diabetes-service
  namespace: ml-platform
